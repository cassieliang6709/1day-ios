name: AISetlog
options:
  bundleIdPrefix: com.cassie
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
targets:
  AISetlog:
    type: application
    platform: iOS
    sources: [AISetlog]
    entitlements:
      path: AISetlog/AISetlog.entitlements
    info:
      path: AISetlog/Info.plist
      properties:
        UILaunchScreen: {}
        CFBundleDisplayName: 1Day
        NSCameraUsageDescription: "Record your 2-second daily challenge clip."
        NSMicrophoneUsageDescription: "Capture audio for your daily clip."
        NSPhotoLibraryAddUsageDescription: "Save your finished weekly vlog."
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        CFBundleURLTypes:
          - CFBundleURLName: com.cassie.AISetlog.join
            CFBundleURLSchemes: [aisetlog]
  AISetlogTests:
    type: bundle.unit-test
    platform: iOS
    sources: [AISetlogTests]
    resources:
      - path: AISetlog/Resources
    dependencies:
      - target: AISetlog
